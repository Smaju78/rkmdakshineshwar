 <script src="js/sheet-loader.js"></script>

<script>
onAllSheetsLoaded(function(){
  var grid = document.getElementById('photoGrid');
  if(!grid || typeof PHOTO_ALBUMS === 'undefined') return;

  // Render all albums
  function renderAlbums(filter){
    var html = '';
    for(var i = 0; i < PHOTO_ALBUMS.length; i++){
      var a = PHOTO_ALBUMS[i];
      if(filter && filter !== 'all' && a.cat !== filter) continue;

      var badge = a.cat.charAt(0).toUpperCase() + a.cat.slice(1);
      html += '<a href="' + a.link + '" target="_blank" class="pcard2 reveal" data-cat="' + a.cat + '">';
      html += '<img src="' + a.img + '" class="pcard2__img" alt="' + a.title + '" loading="lazy">';
      html += '<div class="pcard2__badge">' + badge + '</div>';
      html += '<div class="pcard2__overlay">';
      html += '<div class="pcard2__title">' + a.title + '</div>';
      html += '<div class="pcard2__meta">📸 View Album →</div>';
      html += '</div>';
      html += '<div class="pcard2__bottom"><span class="pcard2__name">' + a.title + '</span><span class="pcard2__link">Open →</span></div>';
      html += '</a>';
    }
    grid.innerHTML = html;

    // Re-trigger reveal animations
    var obs = new IntersectionObserver(function(entries){
      entries.forEach(function(x){ if(x.isIntersecting) x.target.classList.add('vis') });
    },{threshold:0.1});
    grid.querySelectorAll('.reveal').forEach(function(el){ obs.observe(el) });
  }

  renderAlbums('all');

  // Filter buttons
  var btns = document.querySelectorAll('.filter-btn');
  btns.forEach(function(btn){
    btn.addEventListener('click', function(){
      btns.forEach(function(b){ b.classList.remove('active') });
      btn.classList.add('active');
      renderAlbums(btn.getAttribute('data-cat'));
    });
  });
});
</script>
