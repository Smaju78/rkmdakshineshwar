<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Activity Reports  -  Ramakrishna Math, Dakshineshwar</title>
<meta name="description" content="Monthly activity reports of Ramakrishna Math, Dakshineshwar - a transparent record of worship, service, youth engagement, and relief work.">

<meta property="og:description" content="Monthly activity reports of Ramakrishna Math, Dakshineshwar - a transparent record of worship, service, youth engagement, and relief work.">
<meta property="og:image" content="https://smaju78.github.io/rkmdakshineshwar/images/logo.webp">

<link rel="icon" type="image/png" href="images/logo.webp">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head><body>
<div id="site-header"></div>
<div class="page" style="background:var(--cream-warm)">

<!-- HERO -->
<div style="background:linear-gradient(135deg,var(--ink) 0%,#3D2A1E 100%);color:var(--cream);padding:clamp(4rem,8vw,6rem) clamp(1.2rem,4vw,4rem) clamp(2rem,4vw,3rem);text-align:center;position:relative;overflow:hidden">
<div style="position:absolute;inset:0;background:radial-gradient(ellipse 500px 400px at 50% 50%,rgba(232,114,42,0.1),transparent)"></div>
<div style="position:relative">
<div class="breadcrumb" style="color:rgba(240,221,184,0.4)"><a href="index.html" style="color:var(--saffron)">Home</a> / <a href="activities.html" style="color:var(--saffron)">Activities</a> / Reports</div>
<h1 style="font-family:var(--serif);font-size:clamp(2rem,5vw,3.2rem);font-weight:300;color:var(--cream);margin-top:.6rem">Activity <em style="color:var(--gold);font-weight:400">Reports</em></h1>
<p style="font-size:1rem;color:rgba(240,221,184,0.55);max-width:500px;margin:.6rem auto .6rem">A transparent record of the Math's work  -  month by month.</p>
</div>
</div>

<!-- IMPACT STATS BAR -->
<div id="impactBar" style="display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--gold-light);margin:0 clamp(1rem,4vw,4rem);border-radius:14px;overflow:hidden;box-shadow:0 4px 24px var(--shadow);position:relative;z-index:2;margin-top:-2rem">
</div>

<!-- FILTERS -->
<div style="display:flex;justify-content:center;gap:.8rem;margin-top:1.5rem;padding:0 1rem;flex-wrap:wrap" id="reportFilters">
</div>

<!-- MONTH ACCORDION -->
<div class="sec sec--warm" style="max-width: 1300px; margin: 0 auto; padding: 2rem 1rem;">
<div id="reportAccordion">
<p style="color:var(--earth-light);font-size:.9rem;text-align:center">Loading activity reports...</p>
</div>
<div style="text-align:center; padding-top: 1rem;">
<a href="activities.html" class="btn btn--g">View All Activities →</a>
<!-- <a href="donate-indian.html" class="btn btn--p" style="margin-left:.5rem">Support Our Work</a> -->
</div>
</div>

<!-- <div class="sec sec--warm" style="text-align:center">
<a href="activities.html" class="btn btn--g">View All Activities →</a>
<a href="donate-indian.html" class="btn btn--p" style="margin-left:.5rem">Support Our Work</a>
</div> -->

</div>
<div id="site-footer"></div>

<script src="js/sheet-loader.js"></script>
<script src="js/common.js"></script>

<script>
onAllSheetsLoaded(function(){
  if(!ACTIVITY_REPORTS || ACTIVITY_REPORTS.length === 0) return;

  // ===== GROUP BY MONTH+YEAR =====
  var months = [];
  var monthMap = {};
  var yearsSet = {};
  var monthOrder = {January:1,February:2,March:3,April:4,May:5,June:6,July:7,August:8,September:9,October:10,November:11,December:12};

  for(var i = 0; i < ACTIVITY_REPORTS.length; i++){
    var r = ACTIVITY_REPORTS[i];
    var key = r.month + ' ' + r.year;
    yearsSet[r.year] = true;
    if(!monthMap[key]){
      monthMap[key] = {label:key, month:r.month, year:r.year, events:[]};
      months.push(monthMap[key]);
    }
    monthMap[key].events.push(r);
  }

  // Sort: newest first
  months.sort(function(a,b){
    if(a.year !== b.year) return parseInt(b.year) - parseInt(a.year);
    return (monthOrder[b.month]||0) - (monthOrder[a.month]||0);
  });

  var years = Object.keys(yearsSet).sort().reverse();
  var currentYear = new Date().getFullYear().toString();
  var activeYear = years.indexOf(currentYear) > -1 ? currentYear : years[0];
  var activeMonth = 'all';

  // ===== IMPACT STATS (always from full data) =====
  var totalDevotees = 0, totalPatients = 0, totalYouth = 0, totalRetreats = 0;
  for(var i = 0; i < ACTIVITY_REPORTS.length; i++){
    var s = ACTIVITY_REPORTS[i].stat || '';
    var num = parseInt(s.replace(/[^0-9]/g,'')) || 0;
    var ev = ACTIVITY_REPORTS[i].event.toLowerCase();
    if(ev.indexOf('discourse') > -1) totalDevotees += num;
    else if(ev.indexOf('medical') > -1) totalPatients += num;
    else if(ev.indexOf('youth') > -1) totalYouth += num;
    else if(ev.indexOf('retreat') > -1) totalRetreats += num;
  }

  var bar = document.getElementById('impactBar');
  if(bar){
    var stats = [
      {num:totalDevotees.toLocaleString('en-IN'),label:'Devotees at Discourses'},
      {num:totalPatients.toLocaleString('en-IN'),label:'Patients Treated'},
      {num:totalYouth.toLocaleString('en-IN')+'+',label:'Youth Engaged'},
      {num:totalRetreats.toLocaleString('en-IN'),label:'Retreat Participants'}
    ];
    var html='';
    for(var i=0;i<stats.length;i++){
      html+='<div style="background:var(--white);padding:1.2rem;text-align:center">';
      html+='<div style="font-family:var(--serif);font-size:1.5rem;font-weight:700;color:var(--saffron)">'+stats[i].num+'</div>';
      html+='<div style="font-size:.62rem;color:var(--earth-light);letter-spacing:.05em;text-transform:uppercase;margin-top:.15rem">'+stats[i].label+'</div>';
      html+='</div>';
    }
    bar.innerHTML = html;
  }

  // ===== RENDER FILTERS =====
  var filtersDiv = document.getElementById('reportFilters');

  function renderFilters(){
  // Get months available for selected year
    var monthsInYear = [];
    for(var i = 0; i < months.length; i++){
      if(months[i].year === activeYear) monthsInYear.push(months[i].month);
    }

    var html = '';

    // Year dropdown
    html += '<div style="display:flex;align-items:center;gap:.4rem">';
    html += '<label style="font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--saffron)">Year</label>';
    html += '<select id="yearSelect" style="padding:.5rem 2rem .5rem .8rem;border:1.5px solid rgba(212,168,84,0.3);border-radius:10px;font-size:.85rem;font-family:var(--sans);color:var(--ink);background:var(--white);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url(\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 24 24%22 fill=%22%235C4A3A%22><path d=%22M7 10l5 5 5-5z%22/></svg>\');background-repeat:no-repeat;background-position:right .6rem center">';
    for(var i = 0; i < years.length; i++){
      html += '<option value="'+years[i]+'"'+(years[i]===activeYear?' selected':'')+'>'+years[i]+'</option>';
    }
    html += '</select></div>';

    // Month dropdown
    html += '<div style="display:flex;align-items:center;gap:.4rem">';
    html += '<label style="font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--saffron)">Month</label>';
    html += '<select id="monthSelect" style="padding:.5rem 2rem .5rem .8rem;border:1.5px solid rgba(212,168,84,0.3);border-radius:10px;font-size:.85rem;font-family:var(--sans);color:var(--ink);background:var(--white);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url(\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 24 24%22 fill=%22%235C4A3A%22><path d=%22M7 10l5 5 5-5z%22/></svg>\');background-repeat:no-repeat;background-position:right .6rem center">';
    html += '<option value="all"'+(activeMonth==='all'?' selected':'')+'>All Months</option>';
    for(var i = 0; i < monthsInYear.length; i++){
      html += '<option value="'+monthsInYear[i]+'"'+(monthsInYear[i]===activeMonth?' selected':'')+'>'+monthsInYear[i]+'</option>';
    }
    html += '</select></div>';

    filtersDiv.innerHTML = html;

    // Attach change listeners
    document.getElementById('yearSelect').addEventListener('change', function(){
      activeYear = this.value;
      activeMonth = 'all';
      renderFilters();
      renderAccordion();
    });

    document.getElementById('monthSelect').addEventListener('change', function(){
      activeMonth = this.value;
      renderAccordion();
    });
  }

  // ===== RENDER ACCORDION =====
  function renderAccordion(){
    var filtered = [];
    for(var i = 0; i < months.length; i++){
      var m = months[i];
      if(m.year !== activeYear) continue;
      if(activeMonth !== 'all' && m.month !== activeMonth) continue;
      filtered.push(m);
    }

    var acc = document.getElementById('reportAccordion');
    if(!acc) return;

    if(filtered.length === 0){
      acc.innerHTML = '<p style="color:var(--earth-light);font-size:.9rem;text-align:center;padding:2rem">No reports available for this period.</p>';
      return;
    }

    var html = '';
    for(var mi = 0; mi < filtered.length; mi++){
      var month = filtered[mi];
      var isFirst = (mi === 0);

      html += '<div class="report-month" style="margin-bottom:1rem">';
      html += '<button class="report-toggle" data-open="'+(isFirst?'true':'false')+'" style="width:100%;display:flex;justify-content:space-between;align-items:center;padding:1.2rem 1.5rem;background:var(--cream);border:1px solid rgba(212,168,84,0.25);border-radius:14px;cursor:pointer;transition:all .3s;box-shadow:0 2px 10px var(--shadow)">';
      html += '<div style="display:flex;align-items:center;gap:.8rem">';
      html += '<span style="display:inline-block;width:1.3rem;height:1.3rem;border:2px solid var(--saffron);border-radius:4px;border-top:4px solid var(--saffron);flex-shrink:0"></span>';
      html += '<div style="text-align:left">';
      html += '<div style="font-family:var(--serif);font-size:1.2rem;font-weight:600;color:var(--ink)">'+month.label+'</div>';
      html += '<div style="font-size:.68rem;color:var(--earth-light);margin-top:.1rem">'+month.events.length+' activities reported</div>';
      html += '</div></div>';
      html += '<span class="report-arrow" style="font-size:1.2rem;color:var(--saffron);transition:transform .3s">'+(isFirst?'▼':'▶')+'</span>';
      html += '</button>';

      html += '<div class="report-panel" style="'+(isFirst?'':'display:none;')+'padding:.5rem 0">';

      for(var e = 0; e < month.events.length; e++){
        var ev = month.events[e];
        var icon = '📋';
        var evLower = ev.event.toLowerCase();
        if(evLower.indexOf('discourse') > -1) icon = '📖';
        else if(evLower.indexOf('retreat') > -1) icon = '🏕️';
        else if(evLower.indexOf('relief') > -1 || evLower.indexOf('welfare') > -1) icon = '🤝';
        else if(evLower.indexOf('medical') > -1) icon = '🏥';
        else if(evLower.indexOf('youth') > -1) icon = '👨‍🎓';
        else if(evLower.indexOf('children') > -1) icon = '👦';
        else if(evLower.indexOf('devotional') > -1 || evLower.indexOf('song') > -1) icon = '🎵';
        else if(evLower.indexOf('puja') > -1 || evLower.indexOf('tithi') > -1 || evLower.indexOf('celebration') > -1 || evLower.indexOf('shiva') > -1 || evLower.indexOf('christmas') > -1 || evLower.indexOf('kalpataru') > -1) icon = '🪔';
        else if(evLower.indexOf('scholarship') > -1 || evLower.indexOf('education') > -1) icon = '📚';
        else if(evLower.indexOf('visit') > -1) icon = '🙏';
        else if(evLower.indexOf('convention') > -1) icon = '🎤';

        html += '<div style="background:var(--white);border-radius:12px;border:1px solid rgba(212,168,84,0.15);box-shadow:0 1px 6px var(--shadow);padding:1rem 1.2rem;margin-top:.5rem;border-left:4px solid var(--saffron);display:flex;gap:1rem;align-items:flex-start">';
        html += '<span style="font-size:1.3rem;flex-shrink:0;margin-top:.1rem">'+icon+'</span>';
        html += '<div style="flex:1;min-width:0">';
        html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;flex-wrap:wrap">';
        html += '<h3 style="font-family:var(--serif);font-size:1rem;font-weight:600;color:var(--ink);margin:0">'+ev.event+'</h3>';
        if(ev.stat){
          html += '<span style="background:var(--saffron);color:var(--white);font-size:.58rem;font-weight:700;padding:.15rem .5rem;border-radius:100px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;flex-shrink:0">'+ev.stat+'</span>';
        }
        html += '</div>';
        html += '<p style="font-size:.82rem;color:var(--earth-light);line-height:1.6;margin:.3rem 0 0">'+ev.description+'</p>';
        html += '</div></div>';
      }

      html += '</div></div>';
    }

    acc.innerHTML = html;
  }

  // ===== FILTER EVENT HANDLERS =====
  filtersDiv.addEventListener('click', function(e){
    var btn = e.target.closest('.filter-btn');
    if(!btn) return;

    if(btn.hasAttribute('data-year')){
      activeYear = btn.getAttribute('data-year');
      activeMonth = 'all'; // reset month when year changes
      renderFilters();
      renderAccordion();
    } else if(btn.hasAttribute('data-month')){
      activeMonth = btn.getAttribute('data-month');
      // Update only month button states
      var monthBtns = filtersDiv.querySelectorAll('[data-month]');
      monthBtns.forEach(function(b){ b.classList.remove('active') });
      btn.classList.add('active');
      renderAccordion();
    }
  });

  // ===== ACCORDION TOGGLE (delegated) =====
  document.getElementById('reportAccordion').addEventListener('click', function(e){
    var btn = e.target.closest('.report-toggle');
    if(!btn) return;
    var panel = btn.nextElementSibling;
    var arrow = btn.querySelector('.report-arrow');
    var isOpen = btn.getAttribute('data-open') === 'true';
    if(isOpen){
      panel.style.display = 'none';
      arrow.textContent = '▶';
      btn.setAttribute('data-open','false');
    } else {
      panel.style.display = 'block';
      arrow.textContent = '▼';
      btn.setAttribute('data-open','true');
    }
  });

  // ===== INITIAL RENDER =====
  renderFilters();
  renderAccordion();
});
</script>

</body></html>
